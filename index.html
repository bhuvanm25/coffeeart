<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bhuvan's Latte Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #050611;
      --card: #111423;
      --text: #f5f5f5;
      --muted: #a0a3b1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px 12px 0 0;
    }

    .empty {
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <h1>Bhuvan's Latte Arts</h1>

  <div id="gallery" class="grid"></div>
  <div id="empty" class="empty" style="display:none;">Loading images...</div>

  <script>
    const gallery = document.getElementById("gallery");
    const emptyMsg = document.getElementById("empty");

    emptyMsg.style.display = "block";

    fetch("/api/images")
      .then(res => res.json())
      .then(images => {
        gallery.innerHTML = "";

        if (!Array.isArray(images) || images.length === 0) {
          emptyMsg.textContent = "No images found yet.";
          emptyMsg.style.display = "block";
          return;
        }

        emptyMsg.style.display = "none";

        images.forEach(file => {
          const card = document.createElement("div");
          card.className = "card";

          const img = document.createElement("img");
          img.src = file.url;
          img.alt = file.name || "Latte art photo";
          img.loading = "lazy";

          card.appendChild(img);
          gallery.appendChild(card);
        });
      })
      .catch(err => {
        console.error(err);
        emptyMsg.textContent = "Error loading images.";
        emptyMsg.style.display = "block";
      });
  </script>
</body>
</html>
