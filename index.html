<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bhuvan's Latte Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #050611;
      --card: #111423;
      --text: #f5f5f5;
      --muted: #a0a3b1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
    }

    .empty {
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <h1>Bhuvan's Latte Arts</h1>

  <div id="gallery" class="grid"></div>
  <div id="empty" class="empty" style="display:none;">Loading images...</div>

  <script>
    const OWNER = 'bhuvanm25';
    const REPO = 'photo-gallery';
    const BRANCH = 'main';
    const FOLDER_PATH = 'images';

    const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER_PATH}?ref=${BRANCH}`;
    const exts = ['.png', '.jpg', '.jpeg', '.gif', '.webp'];

    function isImage(name) {
      const lower = name.toLowerCase();
      return exts.some(ext => lower.endsWith(ext));
    }

    const gallery = document.getElementById("gallery");
    const emptyMsg = document.getElementById("empty");

    emptyMsg.style.display = "block";

    fetch(apiUrl)
      .then(res => res.json())
      .then(files => {
        if (!Array.isArray(files)) {
          emptyMsg.textContent = "Error loading images.";
          return;
        }

        const images = files.filter(f => f.type === 'file' && isImage(f.name));

        if (images.length === 0) {
          emptyMsg.textContent = "No images found yet.";
          return;
        }

        emptyMsg.style.display = "none";

        images.forEach(file => {
          const imgUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FOLDER_PATH}/${encodeURIComponent(file.name)}`;

          const card = document.createElement('div');
          card.className = 'card';

          const img = document.createElement('img');
          img.src = imgUrl;
          img.alt = file.name;
          img.loading = "lazy";

          card.appendChild(img);
          gallery.appendChild(card);
        });
      })
      .catch(err => {
        console.error(err);
        emptyMsg.textContent = "Error loading images.";
      });
  </script>
</body>
</html>
